<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MangaRead - Đăng nhập</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/navbar.css" rel="stylesheet">
    <style>
        
        /* Login card */
        .login-card {
            background-color: var(--card-dark);
            border-radius: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-dark);
            overflow: hidden;
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #94a3b8;
        }

        /* Form inputs */
        .form-label {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.375rem;
        }

        .input-group-custom {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            z-index: 10;
            transition: color 0.2s;
        }

        .form-control-custom {
            height: 2.75rem;
            padding-left: 2.5rem;
            padding-right: 1rem;
            border-radius: 0.5rem;
            background-color: #1a1023;
            color: white;
            border: 1px solid var(--border-dark);
            font-size: 0.875rem;
        }

        .form-control-custom::placeholder {
            color: #475569;
        }

        .form-control-custom:focus {
            background-color: #1a1023;
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(140, 37, 244, 0.25);
        }

        .form-control-custom:focus ~ .input-icon {
            color: var(--primary);
        }

        .password-toggle {
            position: absolute;
            right: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #cbd5e1;
        }

        .forgot-password {
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: rgba(140, 37, 244, 0.8);
        }

        .btn-primary-custom {
            width: 100%;
            height: 2.75rem;
            border-radius: 0.5rem;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 0.875rem;
            border: none;
            box-shadow: 0 10px 15px -3px rgba(140, 37, 244, 0.2);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary-custom:hover {
            background-color: #7a1fd6;
        }

        .btn-primary-custom:active {
            transform: scale(0.98);
        }

        /* Card footer */
        .card-footer-custom {
            background-color: #20152b;
            border-top: 1px solid var(--border-dark);
            text-align: center;
            padding: 1rem 2rem;
        }

        .card-footer-custom p {
            color: #94a3b8;
            font-size: 0.875rem;
            margin: 0;
        }

        .signup-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            margin-left: 0.25rem;
            transition: color 0.2s;
        }

        .signup-link:hover {
            color: rgba(140, 37, 244, 0.8);
        }

        /* Footer links */
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .footer-links a {
            color: #64748b;
            font-size: 0.875rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #cbd5e1;
        }

        /* Responsive adjustments */
       
        @media (max-width: 576px) {
            .login-card {
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
        }
    </style>
</head>
<body>
    <!-- Background blur effects -->
    <div class="bg-blur-container">
        <div class="blur-circle-1"></div>
        <div class="blur-circle-2"></div>
    </div>

    <div th:replace="~{fragments/navbar-client :: navbarClient}"></div>

    <!-- Main content -->
    <div class="container py-5" style="position: relative; z-index: 10;">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5" style="max-width: 440px;">
                <!-- Login card -->
                <div class="login-card">
                    <div class="p-4 p-sm-5">
                        <!-- Header -->
                        <div class="login-header">
                            <h2>Đăng nhập</h2>
                        </div>

                        <!-- Thông báo lỗi khi sai email/mật khẩu -->
                        <div th:if="${param.error}" class="alert alert-danger py-2 mb-3" role="alert">
                            <i class="bi bi-exclamation-circle me-2"></i>
                            <span>Email hoặc mật khẩu không đúng.</span>
                        </div>
                        <div th:if="${param.logout}" class="alert alert-info py-2 mb-3" role="alert">
                            <i class="bi bi-check-circle me-2"></i>
                            Bạn đã đăng xuất.
                        </div>
                        <div th:if="${param.required}" class="alert alert-warning py-2 mb-3" role="alert">
                            <i class="bi bi-info-circle me-2"></i>
                            <span>Vui lòng đăng nhập để sử dụng tính năng này.</span>
                        </div>

                        <!-- Form đăng nhập -->
                        <form th:action="@{/auth/login}" method="post" id="loginForm">
                            <!-- Email - Spring Security dùng name="username" -->
                            <div class="mb-4">
                                <label for="email" class="form-label">Email</label>
                                <div class="input-group-custom">
                                    <i class="input-icon bi bi-envelope"></i>
                                    <input type="email" class="form-control form-control-custom" id="email" name="username" placeholder="Nhập email" required autocomplete="username">
                                </div>
                            </div>

                            <!-- Mật khẩu -->
                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label for="password" class="form-label mb-0">Mật khẩu</label>
                                    <a href="/auth/forgot-password" class="forgot-password">Quên mật khẩu?</a>
                                </div>
                                <div class="input-group-custom">
                                    <i class="input-icon bi bi-lock"></i>
                                    <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="Nhập mật khẩu" style="padding-right: 2.5rem;" required autocomplete="current-password">
                                    <button type="button" class="password-toggle">
                                        <i class="bi bi-eye-slash"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Submit -->
                            <button type="submit" class="btn btn-primary-custom mt-2">
                                <span>Đăng nhập</span>
                            </button>
                        </form>
                    </div>

                    <!-- Footer -->
                    <div class="card-footer-custom">
                        <p>
                            Bạn chưa có tài khoản?
                            <a href="/register" class="signup-link">Đăng ký ngay</a>
                        </p>
                    </div>
                </div>

                <!-- Links -->
                <div class="footer-links">
                    <a href="#">Terms of Service</a>
                    <a href="#">Privacy Policy</a>
                    <a href="#">Help Center</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/js/navbar-client.js"></script>
    
    <!-- Toggle password visibility -->
    <script>
        document.querySelector('.password-toggle').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            }
        });
    </script>
</body>
</html>
