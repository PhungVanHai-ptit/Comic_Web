<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MangaRead - Register</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/navbar.css" rel="stylesheet">
    <style>
        
        /* Register card */
        .register-card {
            background-color: var(--card-dark);
            border-radius: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-dark);
            overflow: hidden;
            max-width: 520px;
            width: 100%;
        }

        .register-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .register-header h2 {
            font-size: 1.875rem;
            font-weight: 900;
            color: white;
            margin-bottom: 0.75rem;
            letter-spacing: -0.033em;
        }

        .register-header p {
            color: var(--text-secondary);
        }
        /* Card footer */
        .card-footer-custom {
            background-color: #20152b;
            border-top: 1px solid var(--border-dark);
            text-align: center;
            padding: 1rem 2rem;
        }

        .card-footer-custom p {
            color: #94a3b8;
            font-size: 0.875rem;
            margin: 0;
        }

        .login-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            margin-left: 0.25rem;
            transition: color 0.2s;
        }

        .login-link:hover {
            color: rgba(140, 37, 244, 0.8);
        }


        /* Form inputs */
        .form-label {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .form-control-custom {
            width: 100%;
            height: 3rem;
            padding: 0.75rem 3rem 0.75rem 1rem;
            border-radius: 0.5rem;
            background-color: #1a1023;
            color: white;
            border: 1px solid var(--border-dark);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-control-custom::placeholder {
            color: rgba(173, 144, 203, 0.6);
        }

        .form-control-custom:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(140, 37, 244, 0.25);
            background-color: #1a1023;
            color: white;
            outline: none;
        }

        .input-icon-right {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: white;
        }
        /* Password strength */
        .password-strength {
            display: flex;
            gap: 0.25rem;
            margin-top: 0.25rem;
            margin-bottom: 0.5rem;
            height: 0.25rem;
        }

        .strength-bar {
            flex: 1;
            height: 100%;
            border-radius: 50px;
            background-color: var(--border-dark);
            transition: background-color 0.3s;
        }

        .strength-bar.active {
            background-color: #ef4444;
        }

        .strength-bar.active.medium {
            background-color: #f59e0b;
        }

        .strength-bar.active.strong {
            background-color: #3dd68c;
        }

        .password-hint {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 1.25rem;
        }

        /* Password requirements */
        .password-requirements {
            margin-top: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #ef4444;
            margin-bottom: 0.375rem;
            transition: color 0.2s;
        }

        .requirement .bi {
            font-size: 1rem;
        }

        .requirement.valid {
            color: #3dd68c;
        }

        /* Password match message */
        .password-match-message {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            min-height: 1rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .password-match-message.match {
            color: #3dd68c;
        }

        .password-match-message.no-match {
            color: #ef4444;
        }

        .password-match-message .bi {
            font-size: 1rem;
        }

        /* Checkbox */
        .form-check-custom {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-check-input-custom {
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 0.25rem;
            background-color: #1a1023;
            border: 1px solid var(--border-dark);
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 0.125rem;
        }

        .form-check-input-custom:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .form-check-input-custom:focus {
            box-shadow: none;
        }

        .form-check-label-custom {
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .form-check-label-custom:hover {
            color: white;
        }

        .form-check-label-custom a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .form-check-label-custom a:hover {
            color: #7a1fd6;
            text-decoration: underline;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            height: 3rem;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(140, 37, 244, 0.25);
            letter-spacing: 0.015em;
        }

        .btn-submit:hover {
            background-color: #7a1fd6;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Footer link */
        .footer-text {
            text-align: center;
            margin-top: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .footer-text a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            margin-left: 0.25rem;
            transition: color 0.2s;
        }

        .footer-text a:hover {
            color: #7a1fd6;
        }

        /* Copyright */
        .copyright {
            text-align: center;
            margin-top: 2rem;
            color: rgba(173, 144, 203, 0.6);
            font-size: 0.75rem;
        }

        
    </style>
</head>
<body>
    <!-- Background blur effects -->
    <div class="bg-blur-container">
        <div class="blur-circle-1"></div>
        <div class="blur-circle-2"></div>
    </div>

    <div th:replace="~{fragments/navbar-client :: navbarClient}"></div>

    <!-- Main content -->
    <div class="container py-4 py-md-5" style="position: relative; z-index: 10;">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-11 col-md-10 col-lg-8 col-xl-6">
                <!-- Register card -->
                <div class="register-card">
                    <div class="p-4 p-sm-5">
                        <!-- Header -->
                        <div class="register-header">
                            <h2>Đăng ký</h2>
                            <p>Tạo tài khoản để đọc truyện tranh yêu thích của bạn mọi lúc, mọi nơi.</p>
                        </div>

                        <!-- Form -->
                        <form id="registerForm" action="/auth/register" method="post">
                            <!-- Username field -->
                            <div>
                                <label for="username" class="form-label">Tên hiển thị</label>
                                <div class="input-group-custom">
                                    <input type="text" class="form-control-custom" id="username" name="fullName" placeholder="OtakuKing99">
                                    <i class="input-icon-right bi bi-person"></i>
                                </div>
                            </div>

                            <!-- Email field -->
                            <div>
                                <label for="email" class="form-label">Email</label>
                                <div class="input-group-custom">
                                    <input type="email" class="form-control-custom" id="email" name="email" placeholder="name@example.com">
                                    <i class="input-icon-right bi bi-envelope"></i>
                                </div>
                            </div>

                            <!-- Password fields row -->
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="password" class="form-label">Mật khẩu</label>
                                    <div class="input-group-custom">
                                        <input type="password" class="form-control-custom" id="password" name="password" placeholder="••••••••" required>
                                        <button type="button" class="password-toggle">
                                            <i class="bi bi-eye-slash"></i>
                                        </button>
                                    </div>
                                    <!-- Password strength -->
                                    <div class="password-strength mt-2">
                                        <div class="strength-bar"></div>
                                        <div class="strength-bar"></div>
                                        <div class="strength-bar"></div>
                                        <div class="strength-bar"></div>
                                    </div>

                                    <div class="password-requirements mt-2">
                                        <div class="requirement" id="req-length">
                                            <i class="bi bi-x-circle" id="icon-length"></i>
                                            <span>Tối thiểu 8 ký tự</span>
                                        </div>
                                        <div class="requirement" id="req-uppercase">
                                            <i class="bi bi-x-circle" id="icon-uppercase"></i>
                                            <span>Có chữ hoa (A-Z)</span>
                                        </div>
                                        <div class="requirement" id="req-number">
                                            <i class="bi bi-x-circle" id="icon-number"></i>
                                            <span>Có số (0-9)</span>
                                        </div>
                                    </div>
                                </div>
                                <!-- Confirm Password -->
                                <div class="col-12 col-md-6">
                                    <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                                    <div class="input-group-custom">
                                        <input type="password" class="form-control-custom" id="confirmPassword" placeholder="••••••••" required>
                                        <button type="button" class="password-toggle">
                                            <i class="bi bi-eye-slash"></i>
                                        </button>
                                    </div>
                                    <div class="password-match-message mt-2" id="matchMessage"></div>
                                </div>
                            </div>

                            <!-- Thông báo lỗi khi đăng ký -->
                            <div th:if="${successMessage}" class="alert alert-success py-2 mb-3" role="alert">
                                <i class="bi bi-check-circle me-2"></i>
                                <span th:text="${successMessage}"></span>
                            </div>
                            <div th:if="${errorMessage}" class="alert alert-danger py-2 mb-3" role="alert">
                                <i class="bi bi-exclamation-circle me-2"></i>
                                <span th:text="${errorMessage}"></span>
                            </div>

                            <!-- Error/Success message -->
                            <div id="registerMessage" class="mt-2" style="min-height: 1.5rem; font-size: 0.875rem;"></div>

                            <!-- Submit button -->
                            <button type="submit" class="btn-submit mt-3" id="submitBtn">
                                <span>Đăng ký</span>
                            </button>

                        </form>
                    </div>
                    <!-- Footer link -->
                    <div class="card-footer-custom">
                        <p>
                            Đã có tài khoản?
                            <a href="/login" class="login-link">Đăng nhập</a>
                        </p>
                    </div>
                </div>

                <!-- Copyright -->
                <div class="copyright">
                    © 2024 MangaVerse Inc.
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/navbar-client.js"></script>
    <script>
        // Get DOM elements
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthBars = document.querySelectorAll('.strength-bar');
        const matchMessage = document.getElementById('matchMessage');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.querySelector("form");

        // ===== UPDATE REQUIREMENT =====
        function updateRequirement(reqId, iconId, isValid) {
            const req = document.getElementById(reqId);
            const icon = document.getElementById(iconId);

            if (!req || !icon) return;

            if (isValid) {
                req.classList.add('valid');
                icon.classList.remove('bi-x-circle');
                icon.classList.add('bi-check-circle');
            } else {
                req.classList.remove('valid');
                icon.classList.remove('bi-check-circle');
                icon.classList.add('bi-x-circle');
            }
        }

        // ===== CHECK PASSWORD MATCH =====
        function checkPasswordMatch() {
            const password = passwordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            if (confirmPassword === '') {
                matchMessage.textContent = '';
                matchMessage.className = 'password-match-message';
                confirmPasswordInput.style.borderColor = 'var(--border-dark)';
                return false;
            }
            if (password === confirmPassword) {
                matchMessage.innerHTML = '<i class="bi bi-check-circle"></i> Mật khẩu khớp';
                matchMessage.className = 'password-match-message match';
                confirmPasswordInput.style.borderColor = '#22c55e';
                return true;
            } else {
                matchMessage.innerHTML = '<i class="bi bi-x-circle"></i> Mật khẩu không khớp';
                matchMessage.className = 'password-match-message no-match';
                confirmPasswordInput.style.borderColor = '#ef4444';
                return false;
            }
        }

        // ===== TOGGLE SUBMIT BUTTON =====
        function toggleSubmit() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            const valid =
                username.length > 0 &&
                email.length > 0 &&
                password.length >= 8 &&
                /[A-Z]/.test(password) &&
                /[0-9]/.test(password) &&
                password === confirmPassword;

            submitBtn.disabled = !valid;
            submitBtn.style.opacity = valid ? "1" : "0.6";
            submitBtn.style.cursor = valid ? "pointer" : "not-allowed";
        }

        // ===== PASSWORD INPUT EVENT LISTENER =====
        passwordInput.addEventListener('input', function () {
            const password = this.value.trim();
            let strength = 0;

            const hasLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);

            updateRequirement('req-length', 'icon-length', hasLength);
            updateRequirement('req-uppercase', 'icon-uppercase', hasUppercase);
            updateRequirement('req-number', 'icon-number', hasNumber);

            if (hasLength) strength++;
            if (hasUppercase) strength++;
            if (hasNumber) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            strengthBars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    bar.classList.add('active');
                    if (strength <= 1) bar.classList.add('weak');
                    else if (strength === 2) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });

            checkPasswordMatch();
            toggleSubmit();
        });

        // ===== CONFIRM PASSWORD INPUT EVENT LISTENER =====
        confirmPasswordInput.addEventListener('input', () => {
            checkPasswordMatch();
            toggleSubmit();
        });

        // ===== USERNAME AND EMAIL INPUT EVENT LISTENERS =====
        document.getElementById('username').addEventListener('input', toggleSubmit);
        document.getElementById('email').addEventListener('input', toggleSubmit);

        // ===== TOGGLE PASSWORD VISIBILITY =====
        document.querySelectorAll('.password-toggle').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation(); // ✅ Thêm dòng này
                const inputGroup = this.closest('.input-group-custom');
                const input = inputGroup.querySelector('input[type="password"], input[type="text"]');
                const icon = this.querySelector('i');

                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bi-eye-slash');
                    icon.classList.add('bi-eye');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bi-eye');
                    icon.classList.add('bi-eye-slash');
                }
            });
        });

        // ===== INITIALIZE =====
        toggleSubmit();
    </script>
</body>
</html>
