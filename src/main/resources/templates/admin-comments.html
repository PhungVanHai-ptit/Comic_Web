<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MangaRead Admin - Quản lý bình luận</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
    <style>
        .user-avatar { width: 2.5rem; height: 2.5rem; border-radius: 50%; object-fit: cover; }
        .search-wrapper { background-color: var(--surface-dark); border: 1px solid var(--surface-border); border-radius: 0.75rem; padding: 1rem; margin-bottom: 1.5rem; }
        .search-input { background-color: var(--background-dark); border: 1px solid var(--surface-border); color: white; }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

        <main class="main-content">
            <header class="page-header">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                    <div>
                        <h2 class="page-title">Comments</h2>
                        <p class="page-subtitle">Quản lý và kiểm duyệt bình luận của người dùng</p>
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="search-wrapper">
                            <form th:action="@{/admin/comments}" method="get" class="d-flex gap-2">
                                <i class="bi bi-search" style="color: var(--secondary-text); margin-top: 10px; margin-left: 5px;"></i>
                                <input type="text" name="keyword" th:value="${keyword}" class="form-control search-input border-0" placeholder="Tìm nội dung bình luận..." style="background: transparent; box-shadow: none;">
                                <button type="submit" class="btn btn-primary px-4">Tìm</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="table-wrapper">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Người dùng</th>
                                    <th>Truyện</th>
                                    <th>Nội dung</th>
                                    <th>Thời gian</th>
                                    <th class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="comment : ${comments}">
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <img th:src="${comment.user != null and comment.user.avatarUrl != null ? comment.user.avatarUrl : 'https://placehold.co/100x100/8c25f4/FFF?text=' + (comment.user != null ? #strings.substring(comment.user.fullName,0,1) : 'U')}" class="user-avatar" alt="Avatar">
                                            <div>
                                                <div class="fw-bold" th:text="${comment.user != null ? comment.user.fullName : 'Ẩn danh'}">Name</div>
                                                <small class="text-secondary" th:text="${comment.user != null ? comment.user.email : ''}">Email</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <a th:href="@{/comic-detail/{id}(id=${comment.comic.comicId})}" class="text-decoration-none" th:text="${comment.comic.title}">Comic Title</a>
                                    </td>
                                    <td>
                                        <div style="max-width: 400px;" class="text-wrap" th:text="${comment.content}">Content</div>
                                    </td>
                                    <td>
                                        <small class="text-secondary" th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}">Date</small>
                                    </td>
                                    <td class="text-end">
                                        <form th:action="@{/admin/comments/delete/{id}(id=${comment.commentId})}" method="post" style="display: inline;">
                                            <button type="submit" class="btn-action" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa bình luận này?');">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination-wrapper" th:if="${totalPages > 1}">
                        <small class="text-secondary">
                            Hiển thị <span th:text="${comments.size()}">0</span>/<span th:text="${totalElements}">0</span> kết quả
                        </small>
                        <nav>
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/comments(page=${currentPage - 1}, keyword=${keyword})}"><i class="bi bi-chevron-left"></i></a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/admin/comments(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/comments(page=${currentPage + 1}, keyword=${keyword})}"><i class="bi bi-chevron-right"></i></a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
