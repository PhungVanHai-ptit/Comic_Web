<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MangaRead - Xác thực OTP</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <link href="/css/navbar.css" rel="stylesheet">
    <style>
        :root {
            --primary: #8c25f4;
            --background-light: #f7f5f8;
            --background-dark: #191022;
            --card-dark: #251b2e;
            --border-dark: #362249;
            --surface-dark: #261834;
            --text-secondary: #ad90cb;
        }

        body {
            font-family: 'Spline Sans', sans-serif;
            background-color: var(--background-dark);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-blur-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .blur-circle-1 {
            position: absolute;
            top: 25%;
            left: 25%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(140, 37, 244, 0.1);
            filter: blur(120px);
        }

        .blur-circle-2 {
            position: absolute;
            bottom: 25%;
            right: 25%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.05);
            filter: blur(100px);
        }

        .otp-card {
            background-color: var(--card-dark);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3rem 2rem;
            max-width: 460px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .otp-card { padding: 3rem; }
        }

        .otp-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 5rem;
            height: 5rem;
            border-radius: 1rem;
            background-color: rgba(140, 37, 244, 0.1);
            color: var(--primary);
            margin-bottom: 2rem;
        }
        .otp-icon .bi { font-size: 2.5rem; }

        .otp-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.75rem;
            letter-spacing: -0.015em;
        }

        @media (min-width: 768px) {
            .otp-header h1 { font-size: 1.875rem; }
        }

        .otp-header p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .otp-inputs {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        /* FIX: dùng type="text" thay type="number" để maxlength hoạt động */
        .otp-input {
            width: 100%;
            aspect-ratio: 1 / 1;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            transition: all 0.2s;
        }

        .otp-input:focus {
            border-color: var(--primary);
            background-color: transparent;
            outline: none;
            box-shadow: 0 0 0 0.2rem rgba(140, 37, 244, 0.25);
        }

        /* Trạng thái đã điền */
        .otp-input.filled {
            border-color: rgba(140, 37, 244, 0.4);
            background-color: rgba(140, 37, 244, 0.08);
        }

        /* Trạng thái lỗi */
        .otp-input.error {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.08);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .btn-verify {
            width: 100%;
            height: 3.5rem;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1.125rem;
            border: none;
            border-radius: 0.75rem;
            transition: all 0.2s;
            box-shadow: 0 20px 25px -5px rgba(140, 37, 244, 0.3);
            margin-bottom: 2rem;
        }

        .btn-verify:hover { background-color: #7a1fd6; }
        .btn-verify:active { transform: scale(0.98); }

        .resend-section { text-align: center; }

        .resend-section p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .timer-box {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            background-color: rgba(255, 255, 255, 0.05);
            font-size: 0.875rem;
        }

        .timer-box .bi {
            color: var(--primary);
            font-size: 1.25rem;
        }

        .timer-text { color: var(--text-secondary); }

        .timer-countdown {
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-link:hover { color: white; }
        .back-link:hover .bi { transform: translateX(-0.25rem); }
        .back-link .bi {
            font-size: 1.125rem;
            transition: transform 0.2s;
        }
    </style>
</head>
<body>
    <div class="bg-blur-container">
        <div class="blur-circle-1"></div>
        <div class="blur-circle-2"></div>
    </div>

    <div th:replace="~{fragments/navbar-client :: navbarClient}"></div>

    <!-- Main content -->
    <div class="container py-5" style="position: relative; z-index: 10; min-height: calc(100vh - 100px); display: flex; align-items: center;">
        <div class="row justify-content-center w-100">
            <div class="col-12">
                <div class="otp-card mx-auto">
                    <div class="text-center">
                        <div class="otp-icon mx-auto">
                            <i class="bi bi-unlock"></i>
                        </div>
                        <div class="otp-header">
                            <h1>Nhập mã xác thực</h1>
                            <p>Mã xác thực đã được gửi đến email của bạn. Vui lòng kiểm tra và nhập mã gồm 6 chữ số bên dưới.</p>
                        </div>

                        <form id="otpForm" method="post" action="/auth/verify-otp">
                            <!-- Token (hidden) -->
                            <input type="hidden" name="token" th:value="${token}" required>

                            <!-- OTP inputs only -->
                            <div class="otp-inputs">
                                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="0" autocomplete="off" autofocus>
                                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="1" autocomplete="off">
                                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="2" autocomplete="off">
                                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="3" autocomplete="off">
                                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="4" autocomplete="off">
                                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="5" autocomplete="off">
                            </div>

                            <!-- Hidden input for OTP value -->
                            <input type="hidden" name="otp" id="otpValue">

                            <!-- Error/Success message -->
                            <div th:if="${errorMessage}" class="alert alert-danger py-2 mt-3" role="alert">
                                <i class="bi bi-exclamation-circle me-2"></i>
                                <span th:text="${errorMessage}"></span>
                            </div>
                            <div th:if="${successMessage}" class="alert alert-success py-2 mt-3" role="alert">
                                <i class="bi bi-check-circle me-2"></i>
                                <span th:text="${successMessage}"></span>
                            </div>

                            <button type="submit" class="btn-verify mt-4">Xác minh OTP</button>
                        </form>

                        <div class="resend-section">
                            <p>Không nhận được mã?</p>
                            <div class="timer-box" id="timerBox">
                                <i class="bi bi-stopwatch"></i>
                                <span class="timer-text">Gửi lại mã sau</span>
                                <span class="timer-countdown" id="countdown">01:00</span>
                            </div>
                            <div class="mt-4">
                                <a th:href="@{/auth/forgot-password}" class="back-link">
                                    <i class="bi bi-arrow-left-short"></i>
                                    Quay lại nhập email
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/navbar-client.js"></script>
    <script>
        const otpInputs = document.querySelectorAll('.otp-input');
        const otpForm = document.getElementById('otpForm');
        const otpValue = document.getElementById('otpValue');

        otpInputs.forEach((input, index) => {
            input.addEventListener('keydown', function(e) {
                const allowedKeys = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Tab'];
                if (allowedKeys.includes(e.key)) {
                    if (e.key === 'Backspace') {
                        e.preventDefault();
                        this.value = '';
                        this.classList.remove('filled');
                        if (index > 0) otpInputs[index - 1].focus();
                    }
                    if (e.key === 'ArrowLeft' && index > 0) otpInputs[index - 1].focus();
                    if (e.key === 'ArrowRight' && index < otpInputs.length - 1) otpInputs[index + 1].focus();
                    return;
                }

                if (!/^\d$/.test(e.key)) {
                    e.preventDefault();
                    return;
                }

                e.preventDefault();
                this.value = e.key;
                this.classList.add('filled');
                this.classList.remove('error');

                if (index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 1);
                if (this.value) {
                    this.classList.add('filled');
                } else {
                    this.classList.remove('filled');
                }
            });

            input.addEventListener('focus', function() {
                this.select();
            });

            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/\D/g, '');
                if (!pastedData) return;

                for (let i = 0; i < pastedData.length && (index + i) < otpInputs.length; i++) {
                    otpInputs[index + i].value = pastedData[i];
                    otpInputs[index + i].classList.add('filled');
                }

                const nextIndex = Math.min(index + pastedData.length, otpInputs.length - 1);
                otpInputs[nextIndex].focus();
            });
        });

        // Set OTP value before form submission
        otpForm.addEventListener('submit', function(e) {
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            if (otp.length !== 6) {
                e.preventDefault();
                alert('Vui lòng nhập đầy đủ 6 chữ số OTP');
                otpInputs[0].focus();
                return;
            }
            otpValue.value = otp;
        });

        // Timer countdown
        let timeLeft = 600; // 10 minutes
        const countdown = document.getElementById('countdown');
        const timerBox = document.getElementById('timerBox');

        if (countdown) {
            setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    countdown.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                } else if (timerBox) {
                    timerBox.innerHTML = '<a href="/auth/forgot-password" class="back-link"><i class="bi bi-arrow-left-short"></i> Yêu cầu mã mới</a>';
                }
            }, 1000);
        }
    </script>
</body>
</html>
