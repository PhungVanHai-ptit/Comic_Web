<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MangaRead - Đặt Lại Mật Khẩu</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/navbar.css" rel="stylesheet">
    <style>
        :root {
            --primary: #8c25f4;
            --background-dark: #191022;
            --card-dark: #251b2e;
            --border-dark: #362249;
            --surface-dark: #261834;
            --text-secondary: #ad90cb;
        }

        body {
            font-family: 'Spline Sans', sans-serif;
            background-color: var(--background-dark);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-blur-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .blur-circle-1 {
            position: absolute;
            top: 25%;
            left: 25%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(140, 37, 244, 0.1);
            filter: blur(120px);
        }

        .blur-circle-2 {
            position: absolute;
            bottom: 25%;
            right: 25%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.05);
            filter: blur(100px);
        }

        .reset-card {
            background-color: var(--card-dark);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-dark);
            overflow: hidden;
            max-width: 440px;
            width: 100%;
        }

        .reset-card-header {
            height: 6rem;
            background: linear-gradient(180deg, rgba(140, 37, 244, 0.2) 0%, rgba(26, 16, 35, 1) 100%);
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            position: relative;
        }

        .reset-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 3rem;
            height: 3rem;
            border-radius: 1rem;
            background-color: rgba(140, 37, 244, 0.1);
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.75rem;
            letter-spacing: -0.015em;
        }

        .reset-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            padding: 0 1rem;
        }

        .form-label {
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background-color: #1a1023;
            color: white;
            border: 1px solid var(--border-dark);
            height: 3rem;
            border-radius: 0.5rem;
        }

        .form-control:focus {
            background-color: #1a1023;
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(140, 37, 244, 0.25);
        }

        .form-control::placeholder {
            color: rgba(173, 144, 203, 0.6);
        }

        .btn-reset {
            width: 100%;
            height: 3rem;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(140, 37, 244, 0.25);
        }

        .btn-reset:hover {
            background-color: #7a1fd6;
        }

        .btn-reset:active {
            transform: scale(0.98);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .back-link:hover {
            color: white;
        }

        .back-link:hover .bi {
            transform: translateX(-0.25rem);
        }

        .back-link .bi {
            font-size: 1.125rem;
            transition: transform 0.2s;
        }
    </style>
</head>
<body>
    <!-- Background blur effects -->
    <div class="bg-blur-container">
        <div class="blur-circle-1"></div>
        <div class="blur-circle-2"></div>
    </div>

    <div th:replace="~{fragments/navbar-client :: navbarClient}"></div>

    <!-- Main content -->
    <div class="container py-5" style="position: relative; z-index: 10; min-height: calc(100vh - 100px); display: flex; align-items: center;">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <!-- Reset password card -->
                <div class="reset-card">
                    <!-- Header image -->
                    <div class="reset-card-header"></div>
                    
                    <div class="p-4 p-sm-5">
                        <!-- Header -->
                        <div class="reset-header">
                            <div class="reset-icon">
                                <i class="bi bi-key" style="font-size: 1.875rem;"></i>
                            </div>
                            <h2>Đặt Lại Mật Khẩu</h2>
                            <p>Nhập mật khẩu mới của bạn. Mật khẩu phải có ít nhất 8 ký tự, chứa chữ hoa và số.</p>
                        </div>

                        <!-- Form -->
                        <form method="post" action="/auth/reset-password">
                            <!-- Token (hidden) -->
                            <input type="hidden" name="token" th:value="${token}" required>

                            <!-- New Password -->
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">Mật khẩu mới</label>
                                <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="Nhập mật khẩu mới" required>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Xác nhận mật khẩu" required>
                            </div>

                            <!-- Error/Success message -->
                            <div th:if="${errorMessage}" class="alert alert-danger py-2 mb-3" role="alert">
                                <i class="bi bi-exclamation-circle me-2"></i>
                                <span th:text="${errorMessage}"></span>
                            </div>
                            <div th:if="${successMessage}" class="alert alert-success py-2 mb-3" role="alert">
                                <i class="bi bi-check-circle me-2"></i>
                                <span th:text="${successMessage}"></span>
                            </div>

                            <!-- Submit button -->
                            <button type="submit" class="btn-reset">
                                <span>Đặt Lại Mật Khẩu</span>
                            </button>

                            <!-- Back to login link -->
                            <div class="text-center mt-4">
                                <a th:href="@{/login}" class="back-link">
                                    <i class="bi bi-arrow-left-short"></i>
                                    Quay lại đăng nhập
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/navbar-client.js"></script>
</body>
</html>
