<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEditMode} ? 'MangaRead - Chỉnh sửa hồ sơ' : 'MangaRead - Hồ sơ của tôi'">MangaRead - Hồ sơ</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/navbar.css" rel="stylesheet">
    <style>

        /* Profile Card */
        .profile-card {
            background-color: var(--card-dark);
            border-radius: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 560px;
            margin: 3rem auto;
        }

        .profile-header {
            text-align: center;
            padding: 2rem 2rem 0;
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 2rem;
        }
        
         /* Avatar Upload */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .avatar-wrapper {
            position: relative;
            cursor: pointer;
        }

        .profile-avatar {
            width: 7rem;
            height: 7rem;
            border-radius: 50%;
            border: 4px solid rgba(140, 37, 244, 0.2);
            object-fit: cover;
            transition: all 0.25s;
            display: block;
        }

        /* Lớp overlay tối khi hover vào ảnh */
        .avatar-hover-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.25s;
            pointer-events: none;
        }

        .avatar-hover-overlay i {
            color: white;
            font-size: 1.75rem;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .avatar-wrapper:hover .avatar-hover-overlay {
            background-color: rgba(0, 0, 0, 0.45);
        }

        .avatar-wrapper:hover .avatar-hover-overlay i { opacity: 1; }
        .avatar-wrapper:hover .profile-avatar { border-color: rgba(140, 37, 244, 0.6); }

        .avatar-upload-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 2.25rem;
            height: 2.25rem;
            background-color: var(--primary);
            border: 2px solid var(--card-dark);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(140, 37, 244, 0.4);
            transition: all 0.2s;
            cursor: pointer;
            z-index: 2;
        }

        .avatar-upload-btn:hover {
            background-color: #7a1fd6;
            transform: scale(1.1);
        }

        .avatar-upload-btn i { font-size: 0.875rem; pointer-events: none; }

        .avatar-info { text-align: center; }
        .avatar-info h3 { font-size: 1.125rem; font-weight: 700; color: white; margin-bottom: 0.25rem; }
        .avatar-info p  { font-size: 0.875rem; color: var(--text-secondary); margin: 0; }

        /* Hint text under avatar */
        .avatar-hint {
            font-size: 0.7rem;
            color: rgba(173, 144, 203, 0.5);
            margin-top: 0.25rem;
        }

        /* Form */
        .form-label-custom {
            color: white;
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-control-custom {
            height: 3rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            background-color: var(--surface-dark);
            color: white;
            border: none;
            font-size: 1rem;
        }

        .form-control-custom::placeholder {
            color: rgba(173, 144, 203, 0.5);
        }

        .form-control-custom:focus {
            background-color: var(--surface-dark);
            color: white;
            border: none;
            box-shadow: 0 0 0 0.2rem rgba(140, 37, 244, 0.5);
            outline: none;
        }

        /* Password Section */
        .password-section {
            background-color: rgba(42, 29, 55, 0.5);
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1.5rem;
        }

        .password-section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .password-section-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .password-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .password-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .form-control-password {
            height: 2.75rem;
            padding: 0.75rem 3rem 0.75rem 1rem;
            border-radius: 0.5rem;
            background-color: var(--border-dark);
            color: white;
            border: none;
            font-size: 0.875rem;
        }

        .form-control-password::placeholder {
            color: rgba(173, 144, 203, 0.5);
        }

        .form-control-password:focus {
            background-color: var(--border-dark);
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(140, 37, 244, 0.5);
            outline: none;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: white;
        }

        /* Password strength */
        .password-strength {
            display: flex;
            gap: 0.25rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            height: 0.25rem;
        }

        .strength-bar {
            flex: 1;
            height: 100%;
            border-radius: 50px;
            background-color: var(--border-dark);
            transition: background-color 0.3s;
        }

        .strength-bar.active {
            background-color: #ef4444;
        }

        .strength-bar.active.medium {
            background-color: #f59e0b;
        }

        .strength-bar.active.strong {
            background-color: #3dd68c;
        }

        /* Password requirements */
        .password-requirements {
            margin-top: 0.75rem;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #ef4444;
            margin-bottom: 0.375rem;
            transition: color 0.2s;
        }

        .requirement .material-symbols-outlined {
            font-size: 1rem;
        }

        .requirement.valid {
            color: #3dd68c;
        }

        /* Password match message */
        .password-match-message {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            min-height: 1rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .password-match-message.match {
            color: #3dd68c;
        }

        .password-match-message.no-match {
            color: #ef4444;
        }

        .password-match-message .material-symbols-outlined {
            font-size: 1rem;
        }

        /* Old password error */
        .old-password-error {
            font-size: 0.75rem;
            color: #ef4444;
            margin-top: 0.5rem;
            display: none;
            align-items: center;
            gap: 0.25rem;
        }

        .old-password-error.show {
            display: flex;
        }

        /* Buttons */
        .btn-cancel {
            min-width: 100px;
            padding: 0.75rem 1.5rem;
            background-color: transparent;
            color: var(--text-secondary);
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .btn-save {
            min-width: 100px;
            padding: 0.75rem 2rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 700;
            box-shadow: 0 10px 15px -3px rgba(140, 37, 244, 0.2);
            transition: all 0.2s;
        }

        .btn-save:hover {
            background-color: #7a1fd6;
            box-shadow: 0 10px 15px -3px rgba(140, 37, 244, 0.4);
            transform: scale(1.02);
        }

        .btn-save:active {
            transform: scale(1);
        }

        /* Footer */
        .footer {
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: auto;
        }

        .footer p {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin: 0;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar-client :: navbarClient}"></div>

    <!-- Main Content -->
    <div class="container py-4">
        <div class="profile-card">
            <div class="p-4 p-md-5">
                <!-- Header -->
                <div class="profile-header">
                    <h2 class="profile-title" th:text="${isEditMode} ? 'Chỉnh sửa hồ sơ' : 'Hồ sơ của tôi'">Hồ sơ</h2>
                    <!-- Avatar Section -->
                    <div class="avatar-section">
                        <div class="avatar-wrapper" 
                             th:onclick="${isEditMode} ? 'triggerFileUpload()' : ''"
                             th:title="${isEditMode} ? 'Nhấn để đổi ảnh đại diện' : ''"
                             th:style="${!isEditMode} ? 'cursor: default;' : 'cursor: pointer;'">
                            <img th:src="${user.avatarUrl != null && !user.avatarUrl.isEmpty()} ? ${user.avatarUrl} : 'https://lh3.googleusercontent.com/aida-public/AB6AXuBd7xgRq7ASh-qoXXv1z5uah77D2MCUo8ChIVf7sf2Xl90P7LecOLVV01pimVbzFl4cDKHJMLZ853G18JbP9muDihGHBj8HcAW9fR67EkjWC3Ysc6B--ZnlR9labwaUhO9PI6mVU3Uks77cgbWj8d39_i1CTpI4S-jlvfTlnqyrwRD8tiz2Bn4RAL54ToJDS39B_5GJ_aRWjav1zUFECrAsDAUNeccAp80qg2_kn8ttKLlgUzrTIb3vkP6AWvggFPeHLY6w62E_FO41'"
                                class="profile-avatar" id="profileAvatarImg" alt="Profile">

                            <!-- Hover overlay - only show in edit mode -->
                            <div class="avatar-hover-overlay" th:if="${isEditMode}">
                                <i class="bi bi-camera-fill"></i>
                            </div>

                            <!-- Camera button - only show in edit mode -->
                            <button class="avatar-upload-btn" type="button" th:if="${isEditMode}"
                                    onclick="event.stopPropagation(); triggerFileUpload();"
                                    title="Tải ảnh lên">
                                <i class="bi bi-camera"></i>
                            </button>
                        </div>

                        <!-- Input file ẩn -->
                        <input type="file" id="avatarFileInput" accept="image/*" style="display:none;" onchange="handleAvatarChange(event)">

                        <div class="avatar-info">
                            <h3 id="displayName" th:text="${user.fullName}">Người dùng</h3>
                            <p th:text="${user.email}"></p>
                            <p class="avatar-hint" th:text="'Tham gia ' + ${#temporals.format(user.createdAt, 'dd/MM/yyyy')}">Ngày tham gia</p>
                        </div>
                    </div>
                </div>

                <!-- VIEW MODE: Show profile information -->
                <div th:if="!${isEditMode}">
                    <!-- Profile Info -->
                    <div style="background-color: rgba(42, 29, 55, 0.3); padding: 1.5rem; border-radius: 0.75rem; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                            <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">
                                <i class="bi bi-envelope"></i>
                                Email
                            </span>
                            <span style="font-size: 0.875rem; color: white; font-weight: 500;" th:text="${user.email}"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                            <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">
                                <i class="bi bi-person"></i>
                                Tên đầy đủ
                            </span>
                            <span style="font-size: 0.875rem; color: white; font-weight: 500;" th:text="${user.fullName}"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                            <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">
                                <i class="bi bi-calendar-event"></i>
                                Ngày tham gia
                            </span>
                            <span style="font-size: 0.875rem; color: white; font-weight: 500;" th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0;">
                            <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">
                                <i class="bi bi-shield-check"></i>
                                Vai trò

                            <span style="font-size: 0.875rem; color: white; font-weight: 500;" th:text="${user.role.roleName}"></span>

                            <i class="bi bi-pencil-square"></i>
                            Chỉnh sửa thông tin
                        </a>
                    </div>
                </div>

                <!-- EDIT MODE: Show form -->
                <form method="post" action="/users/profile/edit" id="profileForm" th:if="${isEditMode}" onsubmit="return validateProfileForm(event)">
                    <!-- Error Message Alert -->
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert" style="background-color: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.5); color: #ef4444; margin-bottom: 1.5rem;">

                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Success Message Alert -->
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert" style="background-color: rgba(61, 214, 140, 0.1); border: 1px solid rgba(61, 214, 140, 0.5); color: #3dd68c; margin-bottom: 1.5rem;">
                        <i class="bi bi-check-circle-fill"></i>
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Name Field -->
                    <div class="mb-4">
                        <label class="form-label-custom">Họ và tên</label>

                    </div>

                    <!-- Password Section (Optional) -->
                    <div class="password-section">
                        <div class="password-section-header">
                            <i class="bi bi-lock"></i>
                            <h3>Đổi mật khẩu</h3>
                        </div>

                        <!-- Old Password -->
                        <div class="mb-3">
                            <label class="password-label">Mật khẩu cũ</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control form-control-password" id="oldPassword" name="oldPassword" placeholder="Nhập mật khẩu cũ" oninput="clearOldPasswordError()">

                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </div>
                            <div id="oldPasswordError" style="display: none; color: #ef4444; font-size: 0.875rem; margin-top: 0.5rem;">
                                <i class="bi bi-x-circle"></i>
                                <span>Mật khẩu cũ không đúng</span>
                            </div>
                        </div>

                        <!-- New Password -->
                        <div class="mb-3">
                            <label class="password-label">Mật khẩu mới (Để trống để giữ nguyên)</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control form-control-password" id="newPassword" name="password" placeholder="Nhập mật khẩu mới" oninput="updatePasswordStrength()">
                                <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </div>
                            <!-- Password strength -->
                            <div class="password-strength">
                                <div class="strength-bar"></div>
                                <div class="strength-bar"></div>
                                <div class="strength-bar"></div>
                                <div class="strength-bar"></div>
                            </div>
                            <!-- Password requirements -->
                            <div class="password-requirements mt-2">
                                <div class="requirement" id="req-length">
                                    <i class="bi bi-x-circle" id="icon-length"></i>
                                    <span>Tối thiểu 8 ký tự</span>
                                </div>
                                <div class="requirement" id="req-uppercase">
                                    <i class="bi bi-x-circle" id="icon-uppercase"></i>
                                    <span>Có chữ hoa (A-Z)</span>
                                </div>
                                <div class="requirement" id="req-number">
                                    <i class="bi bi-x-circle" id="icon-number"></i>
                                    <span>Có số (0-9)</span>
                                </div>
                            </div>

                            <label class="password-label">Xác nhận mật khẩu</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control form-control-password" id="confirmPassword" placeholder="Xác nhận mật khẩu mới" oninput="updatePasswordMatch()">
                                <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </div>

                    <!-- Avatar upload hidden input (for future MinIO integration) -->

                    <!-- Buttons -->
                    <div class="d-flex justify-content-center gap-3" style="margin-top: 2rem;">
                        <a href="/users/profile" class="btn btn-cancel" style="text-decoration: none;">Hủy</a>

                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2024 MangaPlatform • Account Settings Center</p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/navbar-client.js"></script>
    
    <script>
        // Store selected avatar file
        let selectedAvatarFile = null;
        
        // Load avatar from data attribute on page load
        document.addEventListener('DOMContentLoaded', function() {
            const userAvatarUrl = document.getElementById('profileAvatarImg')?.src;
            if (userAvatarUrl && userAvatarUrl.includes('localhost')) {
                // Update navbar avatar
                const navbarAvatar = document.getElementById('navbarAvatarImg');
                if (navbarAvatar) {
                    navbarAvatar.src = userAvatarUrl;
                }
            }
        });
        
        // Avatar upload 
        function triggerFileUpload() {
            document.getElementById('avatarFileInput').click();
        }

        function handleAvatarChange(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Kiểm tra định dạng
            if (!file.type.startsWith('image/')) {
                alert('Vui lòng chọn file ảnh (JPG, PNG, GIF...)');
                return;
            }

            // Kiểm tra dung lượng (5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('Ảnh quá lớn! Vui lòng chọn ảnh nhỏ hơn 5MB.');
                return;
            }

            // Store file for later upload
            selectedAvatarFile = file;

            // Preview ngay lập tức
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profileAvatarImg').src = e.target.result;
            };
            reader.readAsDataURL(file);

            // Reset input để có thể chọn lại cùng file
            event.target.value = '';
        }

        // Upload avatar to server (called before form submission)
        function uploadAvatarToServer() {
            return new Promise(function(resolve, reject) {
                if (!selectedAvatarFile) {
                    // No avatar to upload, proceed
                    resolve();
                    return;
                }

                const formData = new FormData();
                formData.append('avatar', selectedAvatarFile);

                fetch('/users/profile/avatar', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Update profile avatar from Minio URL
                        document.getElementById('profileAvatarImg').src = data.avatarUrl;
                        
                        // Update navbar avatar
                        const navbarAvatar = document.getElementById('navbarAvatarImg');
                        if (navbarAvatar) {
                            navbarAvatar.src = data.avatarUrl;
                        }
                        
                        // Clear selected file
                        selectedAvatarFile = null;
                        
                        console.log('Ảnh đại diện đã được cập nhật thành công');
                        resolve();
                    } else {
                        alert('Lỗi khi tải ảnh: ' + data.message);
                        reject(new Error(data.message));
                    }
                })
                .catch(error => {
                    console.error('Lỗi khi tải ảnh:', error);
                    alert('Lỗi khi tải ảnh lên: ' + error.message);
                    reject(error);
                });
            });
        }

        // Toggle password visibility
        function togglePassword(inputId, button) {
            const passwordInput = document.getElementById(inputId);
            const icon = button.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            }
        }

        // Clear old password error message when user starts typing
        function clearOldPasswordError() {
            const oldPasswordErrorDiv = document.getElementById('oldPasswordError');
            if (oldPasswordErrorDiv) {
                oldPasswordErrorDiv.style.display = 'none';
            }
        }

        // Update requirement display
        function updateRequirement(reqId, iconId, isValid) {
            const req = document.getElementById(reqId);
            const icon = document.getElementById(iconId);

            if (isValid) {
                req.classList.add('valid');
                icon.classList.remove('bi-x-circle');
                icon.classList.add('bi-check-circle');
            } else {
                req.classList.remove('valid');
                icon.classList.remove('bi-check-circle');
                icon.classList.add('bi-x-circle');
            }
        }

        // Update password strength display - called from oninput
        function updatePasswordStrength() {
            const newPasswordInput = document.getElementById('newPassword');
            if (!newPasswordInput) return;
            
            const strengthBars = document.querySelectorAll('.strength-bar');
            const password = newPasswordInput.value;
            let strength = 0;

            // Check individual requirements
            const hasLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);

            // Update requirement indicators
            updateRequirement('req-length', 'icon-length', hasLength);
            updateRequirement('req-uppercase', 'icon-uppercase', hasUppercase);
            updateRequirement('req-number', 'icon-number', hasNumber);

            // Calculate strength
            if (hasLength) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (hasNumber) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            // Update strength bars
            strengthBars.forEach((bar, index) => {
                bar.classList.remove('active', 'medium', 'strong');
                
                if (index < strength) {
                    bar.classList.add('active');
                    
                    if (strength === 2) {
                        bar.classList.add('medium');
                    } else if (strength >= 3) {
                        bar.classList.add('strong');
                    }
                }
            });

            // Check password match
            updatePasswordMatch();
        }

        // Form validation before submission
        function validateProfileForm(event) {
            event.preventDefault();
            
            const fullNameInput = document.getElementById('fullName');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const oldPasswordInput = document.getElementById('oldPassword');
            const passwordErrorDiv = document.getElementById('passwordError');
            const oldPasswordErrorDiv = document.getElementById('oldPasswordError');
            
            // Validate full name is not empty
            if (!fullNameInput.value.trim()) {
                alert('Vui lòng nhập họ và tên');
                return false;
            }
            
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const oldPassword = oldPasswordInput.value;
            
            // If new password is entered, validate everything
            if (newPassword) {
                // Check password requirements
                const hasLength = newPassword.length >= 8;
                const hasUppercase = /[A-Z]/.test(newPassword);
                const hasNumber = /[0-9]/.test(newPassword);
                
                if (!hasLength || !hasUppercase || !hasNumber) {
                    passwordErrorDiv.textContent = 'Mật khẩu mới phải đáp ứng đủ 3 tiêu chí';
                    passwordErrorDiv.style.display = 'block';
                    return false;
                }
                
                // Check password match
                if (newPassword !== confirmPassword) {
                    passwordErrorDiv.textContent = 'Mật khẩu xác nhận không khớp';
                    passwordErrorDiv.style.display = 'block';
                    return false;
                }
                
                // Require old password verification when changing password
                if (!oldPassword) {
                    oldPasswordErrorDiv.style.display = 'block';
                    return false;
                }
            } else {
                // No password change, hide errors
                passwordErrorDiv.style.display = 'none';
            }
            
            // Clear error messages if validation passes
            passwordErrorDiv.style.display = 'none';
            oldPasswordErrorDiv.style.display = 'none';
            
            // Upload avatar if selected, then submit form
            if (selectedAvatarFile) {
                uploadAvatarToServer()
                    .then(() => {
                        // Avatar uploaded successfully, now submit form
                        document.getElementById('profileForm').submit();
                    })
                    .catch(() => {
                        // Avatar upload failed, don't submit form
                        return false;
                    });
                return false;
            } else {
                // No avatar to upload, submit form directly
                document.getElementById('profileForm').submit();
                return false;
            }
        }
    </script>
</body>
</html>
