<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MangaRead Admin - Sửa thể loại</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <link href="/css/admin.css" rel="stylesheet">
    <style>
        .btn-back { width: 2.5rem; height: 2.5rem; border-radius: 0.5rem; border: 1px solid var(--surface-border); background: none; color: var(--secondary-text); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-back:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }
        .form-card { background-color: var(--surface-dark); border: 1px solid var(--surface-border); border-radius: 0.75rem; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .form-card-header { padding: 1.5rem; border-bottom: 1px solid var(--surface-border); background-color: rgba(25, 16, 34, 0.3); }
        .form-card-title { font-size: 1.125rem; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 0.5rem; }
        .form-card-body { padding: 2rem; }
        .form-label-custom { font-size: 0.75rem; font-weight: 700; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .text-primary { color: var(--primary) !important; }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

        <main class="main-content">
            <header class="page-header">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                    <div class="d-flex align-items-center gap-3">
                        <a th:href="@{/admin/genres}" class="btn-back">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                        <div>
                            <h2 class="page-title">Sửa thể loại</h2>
                            <p class="page-subtitle">Cập nhật thông tin thể loại</p>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/admin/genres}" class="btn btn-outline-secondary">Hủy thay đổi</a>
                        <button type="submit" form="editGenreForm" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>Lưu thay đổi
                        </button>
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="mx-auto" style="max-width: 1000px;">
                    <div class="form-card">
                        <div class="form-card-header">
                            <h3 class="form-card-title">
                                <i class="bi bi-info-circle text-primary"></i>
                                Thông tin thể loại
                            </h3>
                        </div>

                        <form th:action="@{/admin/genres/edit/{id}(id=${genre.genreId})}" th:object="${genre}" method="post" id="editGenreForm">
                            <div class="form-card-body">
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label-custom">Tên thể loại <span style="color: #ef4444;">*</span></label>
                                        <input type="text" class="form-control" th:field="*{name}" required>
                                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label-custom">Mô tả</label>
                                        <textarea class="form-control" th:field="*{description}" rows="4" style="resize: none;"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
