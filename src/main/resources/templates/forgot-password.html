<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MangaRead - Quên mật khẩu</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/navbar.css" rel="stylesheet">
    <style>

        
        /* Forgot password card */
        .forgot-card {
            background-color: var(--card-dark);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-dark);
            overflow: hidden;
            max-width: 440px;
            width: 100%;
        }

        .forgot-card-header {
            height: 6rem;
            background: linear-gradient(180deg, rgba(140, 37, 244, 0.2) 0%, rgba(26, 16, 35, 1) 100%);
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            position: relative;
        }

        .forgot-card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, transparent, var(--surface-dark));
        }

        .forgot-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 3rem;
            height: 3rem;
            border-radius: 1rem;
            background-color: rgba(140, 37, 244, 0.1);
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .forgot-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.75rem;
            letter-spacing: -0.015em;
        }

        .forgot-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            padding: 0 1rem;
        }

        /* Form inputs */
        .form-label-custom {
            color: #cbd5e1;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .form-control-custom {
            width: 100%;
            height: 3.5rem;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border-radius: 0.75rem;
            background-color: var(--background-dark);
            color: white;
            border: 1px solid var(--border-dark);
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .form-control-custom::placeholder {
            color: #64748b;
        }

        .form-control-custom:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(140, 37, 244, 0.25);
            background-color: var(--background-dark);
            color: white;
            outline: none;
        }

        .input-icon-left {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            transition: color 0.2s;
            pointer-events: none;
        }

        .form-control-custom:focus ~ .input-icon-left {
            color: var(--primary);
        }

        /* Submit button */
        .btn-primary-custom {
            width: 100%;
            height: 3.5rem;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 0.75rem;
            transition: all 0.2s;
            box-shadow: 0 20px 25px -5px rgba(140, 37, 244, 0.3);
            letter-spacing: 0.025em;
        }

        .btn-primary-custom:hover {
            background-color: #7a1fd6;
        }

        .btn-primary-custom:active {
            transform: scale(0.98);
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .back-link:hover {
            color: white;
        }

        .back-link:hover .bi {
            transform: translateX(-0.25rem);
        }

        .back-link .bi {
            font-size: 1.125rem;
            transition: transform 0.2s;
        }

        /* Mobile search modal */
        .mobile-search-modal .modal-content {
            background-color: var(--card-dark);
            border: 1px solid var(--border-dark);
        }

        .mobile-search-modal .modal-header {
            border-bottom: 1px solid var(--border-dark);
        }
    </style>
</head>
<body>
    <!-- Background blur effects -->
    <div class="bg-blur-container">
        <div class="blur-circle-1"></div>
        <div class="blur-circle-2"></div>
    </div>

    <div th:replace="~{fragments/navbar-client :: navbarClient}"></div>

    <!-- Main content -->
    <div class="container py-5" 
    style="position: relative; z-index: 10; min-height: calc(100vh - 100px); display: flex; align-items: center;">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <!-- Forgot password card -->
                <div class="forgot-card">
                    <!-- Header image -->
                    <div class="forgot-card-header"></div>
                    
                    <div class="p-4 p-sm-5">
                        <!-- Header -->
                        <div class="forgot-header">
                            <div class="forgot-icon">
                                <i class="bi bi-shield-lock" style="font-size: 1.875rem;"></i>
                            </div>
                            <h2>Quên mật khẩu?</h2>
                            <p>Nhập địa chỉ email liên kết với tài khoản của bạn và chúng tôi sẽ gửi cho bạn mã để đặt lại mật khẩu.</p>
                        </div>

                        <!-- Form -->
                        <form action="/auth/send-otp" method="post">
                            <!-- Email field -->
                            <div>
                                <label class="form-label-custom">Địa chỉ Email</label>
                                <div class="input-group-custom">
                                    <input type="email" class="form-control-custom" name="email" placeholder="name@example.com" required>
                                    <i class="input-icon-left bi bi-envelope"></i>
                                </div>
                            </div>

                            <!-- Error/Success message -->
                            <div th:if="${errorMessage}" class="alert alert-danger py-2 mb-3" role="alert">
                                <i class="bi bi-exclamation-circle me-2"></i>
                                <span th:text="${errorMessage}"></span>
                            </div>
                            <div th:if="${successMessage}" class="alert alert-success py-2 mb-3" role="alert">
                                <i class="bi bi-check-circle me-2"></i>
                                <span th:text="${successMessage}"></span>
                            </div>

                            <!-- Submit button -->
                            <button type="submit" class="btn-primary-custom">
                                <span>Gửi mã khôi phục</span>
                            </button>

                            <!-- Back to login link -->
                            <div class="text-center mt-4">
                                <a th:href="@{/login}" class="back-link">
                                    <i class="bi bi-arrow-left-short"></i>
                                    Quay lại đăng nhập
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/navbar-client.js"></script>
</body>
</html>
